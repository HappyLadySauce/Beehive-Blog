syntax = "proto3";

package content;

option go_package = "services/content/pb";

message ContentSummary {
  int64 id = 1;
  string type = 2;
  string title = 3;
  string slug = 4;
  string summary = 5;
  string status = 6;
  string visibility = 7;
  string ai_access = 8;
  string published_at = 9;
}

message ContentDetail {
  int64 id = 1;
  string type = 2;
  string title = 3;
  string slug = 4;
  string summary = 5;
  string body_markdown = 6;
  string status = 7;
  string visibility = 8;
  string ai_access = 9;
}

message ListContentsRequest {
  int64 page = 1;
  int64 page_size = 2;
  string type = 3;
  string keyword = 4;
  string status = 5;
}

message ListContentsResponse {
  repeated ContentSummary list = 1;
}

message CreateContentRequest {
  string type = 1;
  string title = 2;
  string slug = 3;
  string summary = 4;
  string body_markdown = 5;
  string visibility = 6;
  string ai_access = 7;
}

message UpdateContentRequest {
  int64 id = 1;
  string title = 2;
  string summary = 3;
  string body_markdown = 4;
  string visibility = 5;
  string ai_access = 6;
}

message UpdateStatusRequest {
  int64 id = 1;
  string status = 2;
}

message GetContentRequest {
  int64 id = 1;
}

service Content {
  rpc ListPublicArticles(ListContentsRequest) returns (ListContentsResponse);
  rpc ListContents(ListContentsRequest) returns (ListContentsResponse);
  rpc CreateContent(CreateContentRequest) returns (ContentDetail);
  rpc GetContent(GetContentRequest) returns (ContentDetail);
  rpc UpdateContent(UpdateContentRequest) returns (ContentDetail);
  rpc UpdateContentStatus(UpdateStatusRequest) returns (ContentDetail);
}
