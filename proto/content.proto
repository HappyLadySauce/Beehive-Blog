syntax = "proto3";

package content;

option go_package = "services/content/pb";

message ContentSummary {
  int64 id = 1;
  string type = 2;
  string title = 3;
  string slug = 4;
  string summary = 5;
  string status = 6;
  string visibility = 7;
  string ai_access = 8;
  string published_at = 9;
}

message ContentDetail {
  int64 id = 1;
  string type = 2;
  string title = 3;
  string slug = 4;
  string summary = 5;
  string body_markdown = 6;
  string status = 7;
  string visibility = 8;
  string ai_access = 9;
  ProjectProfile project_profile = 10;
  ExperienceProfile experience_profile = 11;
  TimelineEventProfile timeline_event_profile = 12;
  PortfolioProfile portfolio_profile = 13;
}

message ListContentsRequest {
  int64 page = 1;
  int64 page_size = 2;
  string type = 3;
  string keyword = 4;
  string status = 5;
}

message ListContentsResponse {
  repeated ContentSummary list = 1;
}

message CreateContentRequest {
  string type = 1;
  string title = 2;
  string slug = 3;
  string summary = 4;
  string body_markdown = 5;
  string visibility = 6;
  string ai_access = 7;
  ProjectProfile project_profile = 8;
  ExperienceProfile experience_profile = 9;
  TimelineEventProfile timeline_event_profile = 10;
  PortfolioProfile portfolio_profile = 11;
}

message UpdateContentRequest {
  int64 id = 1;
  string title = 2;
  string summary = 3;
  string body_markdown = 4;
  string visibility = 5;
  string ai_access = 6;
  ProjectProfile project_profile = 7;
  ExperienceProfile experience_profile = 8;
  TimelineEventProfile timeline_event_profile = 9;
  PortfolioProfile portfolio_profile = 10;
}

message UpdateStatusRequest {
  int64 id = 1;
  string status = 2;
}

message GetContentRequest {
  int64 id = 1;
}

message Empty {}

message ProjectProfile {
  string project_name = 1;
  string stack = 2;
  string repo_url = 3;
  string demo_url = 4;
  string started_at = 5;
  string ended_at = 6;
}

message ExperienceProfile {
  string org_name = 1;
  string role_name = 2;
  string location = 3;
  string started_at = 4;
  string ended_at = 5;
}

message TimelineEventProfile {
  string event_time = 1;
  string event_category = 2;
}

message PortfolioProfile {
  string artifact_type = 1;
  string external_link = 2;
}

message Tag {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  string color = 4;
  string description = 5;
}

message ListTagsResponse {
  repeated Tag list = 1;
}

message CreateTagRequest {
  string name = 1;
  string slug = 2;
  string color = 3;
  string description = 4;
}

message DeleteTagRequest {
  int64 id = 1;
}

message Relation {
  int64 id = 1;
  int64 source_content_id = 2;
  int64 target_content_id = 3;
  string relation_type = 4;
  int32 weight = 5;
  string note = 6;
}

message ListRelationsRequest {
  int64 content_id = 1;
}

message ListRelationsResponse {
  repeated Relation list = 1;
}

message CreateRelationRequest {
  int64 source_content_id = 1;
  int64 target_content_id = 2;
  string relation_type = 3;
  int32 weight = 4;
  string note = 5;
}

message DeleteRelationRequest {
  int64 id = 1;
}

message Attachment {
  int64 id = 1;
  int64 content_id = 2;
  string storage_provider = 3;
  string bucket = 4;
  string object_key = 5;
  string file_name = 6;
  string mime_type = 7;
  string ext = 8;
  int64 size_bytes = 9;
  string usage_type = 10;
}

message ListAttachmentsRequest {
  int64 content_id = 1;
  int64 page = 2;
  int64 page_size = 3;
}

message ListAttachmentsResponse {
  repeated Attachment list = 1;
}

message CreateAttachmentRequest {
  int64 content_id = 1;
  string storage_provider = 2;
  string bucket = 3;
  string object_key = 4;
  string file_name = 5;
  string mime_type = 6;
  string ext = 7;
  int64 size_bytes = 8;
  string usage_type = 9;
}

message DeleteAttachmentRequest {
  int64 id = 1;
}

message Comment {
  int64 id = 1;
  int64 content_id = 2;
  int64 parent_comment_id = 3;
  string author_name = 4;
  string author_email = 5;
  string body_markdown = 6;
  string status = 7;
  string moderation_note = 8;
}

message ListCommentsRequest {
  int64 content_id = 1;
  int64 page = 2;
  int64 page_size = 3;
}

message ListCommentsResponse {
  repeated Comment list = 1;
}

message CreateCommentRequest {
  int64 content_id = 1;
  int64 parent_comment_id = 2;
  string author_name = 3;
  string author_email = 4;
  string body_markdown = 5;
}

message UpdateCommentStatusRequest {
  int64 id = 1;
  string status = 2;
  string moderation_note = 3;
}

service Content {
  rpc ListPublicArticles(ListContentsRequest) returns (ListContentsResponse);
  rpc ListContents(ListContentsRequest) returns (ListContentsResponse);
  rpc CreateContent(CreateContentRequest) returns (ContentDetail);
  rpc GetContent(GetContentRequest) returns (ContentDetail);
  rpc UpdateContent(UpdateContentRequest) returns (ContentDetail);
  rpc UpdateContentStatus(UpdateStatusRequest) returns (ContentDetail);
  rpc ListTags(Empty) returns (ListTagsResponse);
  rpc CreateTag(CreateTagRequest) returns (Tag);
  rpc DeleteTag(DeleteTagRequest) returns (Empty);
  rpc ListRelations(ListRelationsRequest) returns (ListRelationsResponse);
  rpc CreateRelation(CreateRelationRequest) returns (Relation);
  rpc DeleteRelation(DeleteRelationRequest) returns (Empty);
  rpc ListAttachments(ListAttachmentsRequest) returns (ListAttachmentsResponse);
  rpc CreateAttachment(CreateAttachmentRequest) returns (Attachment);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (Empty);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc CreateComment(CreateCommentRequest) returns (Comment);
  rpc UpdateCommentStatus(UpdateCommentStatusRequest) returns (Comment);
}
