syntax = "proto3";

package search;

option go_package = "services/search/pb";

message SearchRequest {
  string query = 1;
  int64 page = 2;
  int64 page_size = 3;
  string type = 4;
}

message SearchResultItem {
  int64 content_id = 1;
  string type = 2;
  string title = 3;
  string slug = 4;
  string summary = 5;
  string highlight = 6;
  double score = 7;
}

message SearchResponse {
  repeated SearchResultItem list = 1;
}

service Search {
  rpc Query(SearchRequest) returns (SearchResponse);
}
