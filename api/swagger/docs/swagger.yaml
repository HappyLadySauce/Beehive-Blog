info:
  contact: {}
paths:
  /api/v1/admin/articles:
    get:
      description: 需管理员；分页列出未软删文章，支持 keyword/category slug/tag/author 筛选；status 为逗号分隔多状态，省略则不限状态（含草稿）
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: pageSize
        type: integer
      - description: 关键词
        in: query
        name: keyword
        type: string
      - description: 分类 slug
        in: query
        name: category
        type: string
      - description: 标签 slug，逗号分隔多标签交集
        in: query
        name: tag
        type: string
      - description: 作者用户名
        in: query
        name: author
        type: string
      - description: 状态，逗号分隔 draft,published,archived,private,scheduled
        in: query
        name: status
        type: string
      - description: 排序 newest|oldest|popular
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.AdminArticleListResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 管理员文章列表
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: 需管理员；创建草稿或已发布文章，可指定 slug 或由标题生成唯一 slug。categoryId：省略或 ≤0 时自动归入
        slug=default 的默认分类；传正整数必须为已存在分类主键。tagIds：已存在标签主键列表，可省略；≤0 与重复 id 会被忽略；列表内
        id 必须全部存在否则 400。
      parameters:
      - description: 文章正文
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleDetailResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 管理员创建文章
      tags:
      - admin
  /api/v1/admin/articles/{id}:
    delete:
      description: 需管理员；软删除文章并清理关联标签；开启 Hexo auto_sync 时异步删 md
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.DeleteArticleResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 管理员删除文章
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: 需管理员；部分字段更新。categoryId：仅当请求体包含该字段时更新；传 null/省略不改变；传 ≤0 表示置空分类；传正整数须为已存在分类。tagIds：仅当请求体包含非空
        tagIds 数组时整表替换关联；须全部为已存在标签主键（会去重并忽略 ≤0）。
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新字段
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleDetailResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 管理员更新文章
      tags:
      - admin
  /api/v1/admin/articles/{id}/password:
    put:
      consumes:
      - application/json
      description: 需管理员；非空密码长度 4–20；空字符串表示清除密码
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 密码（可空）
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateArticlePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleSecurityResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 设置或清除文章访问密码
      tags:
      - admin
  /api/v1/admin/articles/{id}/pin:
    put:
      consumes:
      - application/json
      description: 需管理员；取消置顶时 pin_order 归零
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 置顶与排序
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateArticlePinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleDetailResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 更新文章置顶
      tags:
      - admin
  /api/v1/admin/articles/{id}/slug:
    put:
      consumes:
      - application/json
      description: 需管理员；slug 须全局唯一
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 新 slug
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateArticleSlugRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleDetailResponse'
              type: object
        "400":
          description: Bad Request
