definitions:
  common.BaseResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  v1.ArticleAuthorItem:
    properties:
      avatar:
        type: string
      id:
        type: integer
      nickname:
        type: string
      username:
        type: string
    type: object
  v1.ArticleCategoryItem:
    properties:
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  v1.ArticleDetailResponse:
    properties:
      author:
        $ref: '#/definitions/v1.ArticleAuthorItem'
      category:
        $ref: '#/definitions/v1.ArticleCategoryItem'
      commentCount:
        type: integer
      content:
        type: string
      coverImage:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      likeCount:
        type: integer
      next:
        $ref: '#/definitions/v1.ArticleNavItem'
      pinOrder:
        type: integer
      previous:
        $ref: '#/definitions/v1.ArticleNavItem'
      protected:
        type: boolean
      publishedAt:
        type: string
      slug:
        type: string
      summary:
        type: string
      tags:
        items:
          $ref: '#/definitions/v1.ArticleTagItem'
        type: array
      title:
        type: string
      updatedAt:
        type: string
      viewCount:
        type: integer
    type: object
  v1.ArticleListItem:
    properties:
      author:
        $ref: '#/definitions/v1.ArticleAuthorItem'
      category:
        $ref: '#/definitions/v1.ArticleCategoryItem'
      commentCount:
        type: integer
      coverImage:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      likeCount:
        type: integer
      pinOrder:
        type: integer
      publishedAt:
        type: string
      slug:
        type: string
      summary:
        type: string
      tags:
        items:
          $ref: '#/definitions/v1.ArticleTagItem'
        type: array
      title:
        type: string
      updatedAt:
        type: string
      viewCount:
        type: integer
    type: object
  v1.ArticleListResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/v1.ArticleListItem'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  v1.ArticleNavItem:
    properties:
      id:
        type: integer
      slug:
        type: string
      title:
        type: string
    type: object
  v1.ArticleTagItem:
    properties:
      color:
        type: string
      id:
        type: integer
      name:
        type: string
      slug:
        type: string
    type: object
  v1.LoginRequest:
    properties:
      account:
        description: 账号 支持用户名或邮箱
        maxLength: 50
        minLength: 3
        type: string
      password:
        description: 密码 6-20位
        maxLength: 20
        minLength: 6
        type: string
    required:
    - account
    - password
    type: object
  v1.LogoutRequest:
    type: object
  v1.RecordArticleViewResponse:
    properties:
      viewCount:
        type: integer
    type: object
  v1.RegisterRequest:
    properties:
      email:
        description: 邮箱 50位
        maxLength: 50
        type: string
      password:
        description: 密码 6-20位
        maxLength: 20
        minLength: 6
        type: string
      username:
        description: 用户名 3-20位
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  v1.SyncPostsRequest:
    properties:
      rebuild:
        description: Rebuild 为 true 且服务端配置了 hexo.generate_args 时，在同步后执行静态站点生成。
        type: boolean
    type: object
  v1.SyncResponse:
    properties:
      created:
        type: integer
      deleted:
        type: integer
      files:
        items:
          type: string
        type: array
      total:
        type: integer
      updated:
        type: integer
    type: object
  v1.SyncStatusResponse:
    properties:
      last_sync_time:
        type: string
      local_files:
        type: integer
      pending_sync:
        type: boolean
      total_posts:
        type: integer
    type: object
  v1.UpdatePasswordRequest:
    properties:
      newPassword:
        maxLength: 20
        minLength: 6
        type: string
      oldPassword:
        maxLength: 20
        minLength: 6
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  v1.UpdateProfileRequest:
    properties:
      avatar:
        maxLength: 500
        type: string
      nickname:
        maxLength: 50
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/admin/ping:
    get:
      consumes:
      - application/json
      description: 需管理员角色；用于验证 /api/v1/admin 分组与鉴权是否生效
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 管理员探活
      tags:
      - admin
  /api/v1/admin/sync/posts:
    post:
      consumes:
      - application/json
      description: 将已发布文章写入 Hexo source/_posts，可选执行 hexo 构建命令
      parameters:
      - description: 选项
        in: body
        name: request
        schema:
          $ref: '#/definitions/v1.SyncPostsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.SyncResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: Hexo 文章全量同步
      tags:
      - admin
  /api/v1/admin/sync/status:
    get:
      description: 查询上次同步时间与本地 beehive 文章文件数量等
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.SyncStatusResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: Hexo 同步状态
      tags:
      - admin
  /api/v1/articles:
    get:
      description: 公开已发布文章，支持分类/标签 slug 筛选
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页条数
        in: query
        name: pageSize
        type: integer
      - description: 关键词
        in: query
        name: keyword
        type: string
      - description: 分类 slug
        in: query
        name: category
        type: string
      - description: 标签 slug，逗号分隔多标签交集
        in: query
        name: tag
        type: string
      - description: 作者用户名
        in: query
        name: author
        type: string
      - description: 排序 newest|oldest|popular
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 文章列表
      tags:
      - articles
  /api/v1/articles/{id}:
    get:
      description: 公开已发布文章详情
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.ArticleDetailResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 文章详情
      tags:
      - articles
  /api/v1/articles/{id}/view:
    post:
      description: 已发布文章浏览量 +1
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.RecordArticleViewResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 记录文章浏览
      tags:
      - articles
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名或邮箱登录并返回访问令牌
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 用户登录
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户并返回访问令牌
      parameters:
      - description: 注册参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 用户注册
      tags:
      - auth
  /api/v1/user/logout:
    post:
      consumes:
      - application/json
      description: 使当前访问令牌立即失效
      parameters:
      - description: 登出参数（可空）
        in: body
        name: request
        schema:
          $ref: '#/definitions/v1.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 用户登出
      tags:
      - user
  /api/v1/user/me:
    get:
      consumes:
      - application/json
      description: 返回已登录用户的公开资料
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 当前用户信息
      tags:
      - user
  /api/v1/user/notifications:
    get:
      consumes:
      - application/json
      description: 分页获取当前用户的站内通知
      parameters:
      - description: 页码，默认 1
        in: query
        name: page
        type: integer
      - description: 每页条数，默认 20，最大 100
        in: query
        name: pageSize
        type: integer
      - description: 按已读筛选
        in: query
        name: isRead
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 通知列表
      tags:
      - user
  /api/v1/user/password:
    put:
      consumes:
      - application/json
      description: 校验当前密码后更新；成功后撤销 Redis 会话快照需重新登录
      parameters:
      - description: 密码
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 修改密码
      tags:
      - user
  /api/v1/user/profile:
    put:
      consumes:
      - application/json
      description: 更新昵称和/或头像
      parameters:
      - description: 资料
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 更新用户资料
      tags:
      - user
  /livez:
    get:
      consumes:
      - application/json
      description: 检查服务是否存活
      produces:
      - text/plain
      responses:
        "200":
          description: livez
          schema:
            type: string
      summary: 健康检查
      tags:
      - health
  /readyz:
    get:
      consumes:
      - application/json
      description: 检查服务是否就绪
      produces:
      - text/plain
      responses:
        "200":
          description: readyz
          schema:
            type: string
      summary: 就绪检查
      tags:
      - health
swagger: "2.0"
