definitions:
  common.BaseResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  v1.LoginRequest:
    properties:
      account:
        description: 账号 支持用户名或邮箱
        maxLength: 50
        minLength: 3
        type: string
      password:
        description: 密码 6-20位
        maxLength: 20
        minLength: 6
        type: string
    required:
    - account
    - password
    type: object
  v1.LogoutRequest:
    type: object
  v1.RegisterRequest:
    properties:
      email:
        description: 邮箱 50位
        maxLength: 50
        type: string
      password:
        description: 密码 6-20位
        maxLength: 20
        minLength: 6
        type: string
      username:
        description: 用户名 3-20位
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
info:
  contact: {}
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名或邮箱登录并返回访问令牌
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 用户登录
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: 使当前访问令牌立即失效
      parameters:
      - description: 登出参数（可空）
        in: body
        name: request
        schema:
          $ref: '#/definitions/v1.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 用户登出
      tags:
      - auth
  /api/v1/user/register:
    post:
      consumes:
      - application/json
      description: 创建新用户并返回访问令牌
      parameters:
      - description: 注册参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/common.BaseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.BaseResponse'
      summary: 用户注册
      tags:
      - user
  /livez:
    get:
      consumes:
      - application/json
      description: 检查服务是否存活
      produces:
      - text/plain
      responses:
        "200":
          description: livez
          schema:
            type: string
      summary: 健康检查
      tags:
      - health
  /readyz:
    get:
      consumes:
      - application/json
      description: 检查服务是否就绪
      produces:
      - text/plain
      responses:
        "200":
          description: readyz
          schema:
            type: string
      summary: 就绪检查
      tags:
      - health
swagger: "2.0"
