insecure:
    bind-address: 0.0.0.0 # 绑定的不安全 IP 地址，设置为 0.0.0.0 表示使用全部网络接口，默认为 127.0.0.1
    bind-port: 8080 # 提供非安全认证的监听端口，默认为 8080
    # trusted-proxies: # 反向代理后的可信 IP/CIDR，用于解析 X-Forwarded-For（示例：127.0.0.1 或 10.0.0.0/8）；留空则不信任代理
    #   - 127.0.0.1

database:
    host: 127.0.0.1
    port: 5432
    user: Beehive-Blog
    password: Beehive-Blog
    db: Beehive-Blog
    ssl-mode: disable
    max-idle-conns: 10
    max-open-conns: 100
    conn-max-lifetime: 1h
    conn-max-idle-time: 30m

cache:
    host: 127.0.0.1
    port: 6379
    db: 0

jwt:
    issuer: beehive-blog # JWT iss 声明，验证侧期望的发行者
    secret: beehive-blog-secret-fawfawfawfawfaw # HS256 签名密钥，至少 32 字节；生产环境请通过环境变量注入
    access-ttl: 15m # 访问令牌存活时间
    refresh-ttl: 168h # 刷新令牌存活时间，必须严格大于 access-ttl

# email: 出站 SMTP 默认值；仅当 setting.application_settings 无 id=1 活跃行时写入首行种子。有数据后以数据库为准。
email:
    enabled: false
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    from-name: ""
    tls: starttls

attachment:
    default-storage: local # local | s3 | oss
    local-root: data/attachments
    max-bytes: 10485760
    allowed-mime-prefixes:
        - image/
        - application/pdf
    presign-ttl: 15m
    s3:
        bucket: ""
        upload-base-url: ""
        download-base-url: ""
    oss:
        bucket: ""
        upload-base-url: ""
        download-base-url: ""

github-oauth2:
    client-id: 
    client-secret: 
    redirect-url: http://example.com/auth/github/callback
    auth-url: https://github.com/login/oauth/authorize
    token-url: https://github.com/login/oauth/access_token
    user-info-url: https://api.github.com/user
    allow-non-github-endpoints: false