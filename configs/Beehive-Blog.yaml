server:
    bindAddress: 0.0.0.0 # 绑定的不安全 IP 地址，设置为 0.0.0.0 表示使用全部网络接口，默认为 127.0.0.1
    bindPort: 8081      # 提供非安全认证的监听端口，默认为 8081

# 数据库配置
db:
    host: 127.0.0.1         # 数据库主机地址
    port: 5432              # 数据库端口
    username: Beehive-Blog  # 数据库用户名
    password: Beehive-Blog  # 数据库密码
    database: Beehive-Blog  # 数据库名称
    charset: utf8mb4        # 数据库字符集
    timeZone: Asia/Shanghai # 时区设置
    sslMode: disable        # PostgreSQL TLS 模式: disable/require/verify-ca/verify-full（生产建议非 disable）
    connectTimeoutSeconds: 5 # 数据库连接超时（秒）
    autoMigrate: false      # 是否在应用启动时自动迁移（生产建议关闭，改为发布流程执行）
    parseTime: true         # 是否解析时间
    loc: Local              # 时间位置

# Redis 配置
redis:
    redisHost: 127.0.0.1:6379       # Redis 主机地址
    redisPass: ""               # Redis 密码，无密码时留空
    redisDB: 0                  # Redis 数据库索引
    dialTimeoutSeconds: 5       # Redis 建连超时（秒）
    readTimeoutSeconds: 3       # Redis 读超时（秒）
    writeTimeoutSeconds: 3      # Redis 写超时（秒）
    connectTimeoutSeconds: 3    # 启动阶段 Redis 探活超时（秒）
    enableTLS: false            # 是否启用 Redis TLS（生产建议开启）
    insecureSkipVerify: false   # 是否跳过 Redis 证书校验（仅调试场景）

# Hexo 同步：数据库已发布文章 → ui/hexo/source/_posts/*.md
hexo:
    posts_dir: ui/hexo/source/_posts
    auto_sync: false
    generate_workdir: ui/hexo
    # 同步后是否执行生成：需 POST /admin/sync/posts 且 body {"rebuild":true}；示例如 pnpm：
    # generate_args: ["pnpm", "run", "build"]
    generate_args: []

