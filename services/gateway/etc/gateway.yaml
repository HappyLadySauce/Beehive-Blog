Name: gateway
Host: 0.0.0.0
Port: 8888
Timeout: 5000
UpstreamFiles:
  - upstreams/identity.yaml
  - upstreams/content.yaml
  - upstreams/search.yaml
IdentityRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: identity.rpc
  NonBlock: true
  Timeout: 2000
ContentRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: content.rpc
  NonBlock: true
  Timeout: 2000
SearchRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: search.rpc
  NonBlock: true
  Timeout: 2000
Auth:
  AccessSecret: change-me-in-production
RateLimit:
  Enabled: true
  RPS: 80
  Burst: 160
AccessLog:
  SlowRequestWarnThresholdMs: 500
